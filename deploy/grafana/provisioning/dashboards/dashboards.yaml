apiVersion: 1
providers:
  - name: panopticon
    folder: Panopticon
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false       # dashboards are code; edit the JSON, redeploy
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
